services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: email_automation
      MYSQL_ROOT_PASSWORD: local-development-only
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-plocal-development-only"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      PUBLIC_BASE_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: local-development-only
      DB_NAME: email_automation
      JWT_SECRET: local-development-secret-change-before-use

volumes:
  mysql-data:
