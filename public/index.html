<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create personalized email and SMS campaigns from one focused workspace.">
  <title>SendChap — Email and SMS campaigns, simplified</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="marketing-shell">
  <div class="container">
    <header class="marketing-nav">
      <a class="brand" href="/" aria-label="SendChap home">
        <span class="brand-mark">S</span>
        <span>SendChap</span>
      </a>
      <nav class="marketing-actions" aria-label="Account navigation">
        <a class="marketing-link" href="/login" id="loginBtn">Sign in</a>
        <a class="marketing-link primary" href="/register" id="registerBtn">Get started</a>
      </nav>
    </header>

    <main class="hero">
      <section class="hero-copy">
        <div class="eyebrow"><span class="eyebrow-dot"></span>Built for focused outreach</div>
        <h1>Messages that move <span>people.</span></h1>
        <p>Create personalized email and SMS campaigns, understand engagement, and keep every recipient organized from one calm workspace.</p>
        <div class="hero-actions">
          <a class="cta-button" href="/register">Start sending</a>
          <a class="cta-button secondary" href="/login">Open dashboard</a>
        </div>
        <div class="hero-proof">
          <div class="proof-avatars" aria-hidden="true">
            <span class="proof-avatar">JM</span><span class="proof-avatar">AK</span><span class="proof-avatar">TN</span>
          </div>
          <span>Email, SMS and analytics in one place</span>
        </div>
      </section>

      <div class="product-preview" aria-label="SendChap dashboard preview">
        <div class="preview-window">
          <div class="preview-bar"><span class="preview-dot"></span><span class="preview-dot"></span><span class="preview-dot"></span></div>
          <div class="preview-body">
            <div class="preview-side"><i></i><i></i><i></i><i></i></div>
            <div class="preview-content">
              <div class="preview-title"></div>
              <div class="preview-kpis"><span class="preview-kpi"></span><span class="preview-kpi"></span><span class="preview-kpi"></span></div>
              <div class="preview-chart"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
